<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小彌算命</title>
<link rel="stylesheet" href="theme.css">
</head>
<body>

<div class="xf-container">

  <!-- ===== 畫面1：首頁 ===== -->
  <div id="xf-page-home" class="xf-page active">
    <div class="xf-hero">
      <div class="xf-seal">
        <div class="xf-seal-text">小彌<br>算命</div>
      </div>
      <h1 class="xf-hero-title">小彌算命</h1>
      <div class="xf-divider"></div>
      <p class="xf-hero-subtitle">八字 · 紫微 · 靈數 · 人類圖 · 占星 · 塔羅</p>
      <p class="xf-hero-desc">
        輸入你的生辰，讓小彌為你推演天機。<br>
        六大命理系統，一幅屬於你的生命地圖。
      </p>
      <button class="xf-btn xf-btn-seal" id="xf-start-btn">開始算命</button>
    </div>
    <div class="xf-footer">— 小彌為你而算 —</div>
  </div>

  <!-- ===== 畫面2：輸入表單 ===== -->
  <div id="xf-page-form" class="xf-page">
    <div class="xf-frame-double xf-form-section">
      <h2 class="xf-form-title">請輸入生辰</h2>
      <div class="xf-divider"></div>

      <form id="xf-form">
        <div class="xf-form-group">
          <label class="xf-label" for="xf-name">姓名</label>
          <input type="text" id="xf-name" class="xf-input" placeholder="你的名字" required>
        </div>

        <div class="xf-row">
          <div class="xf-form-group">
            <label class="xf-label" for="xf-birthday">出生日期</label>
            <input type="date" id="xf-birthday" class="xf-input" required>
          </div>
          <div class="xf-form-group">
            <label class="xf-label" for="xf-hour">出生時辰</label>
            <select id="xf-hour" class="xf-select">
              <option value="">不確定</option>
              <option value="子">子時 (23:00-01:00)</option>
              <option value="丑">丑時 (01:00-03:00)</option>
              <option value="寅">寅時 (03:00-05:00)</option>
              <option value="卯">卯時 (05:00-07:00)</option>
              <option value="辰">辰時 (07:00-09:00)</option>
              <option value="巳">巳時 (09:00-11:00)</option>
              <option value="午">午時 (11:00-13:00)</option>
              <option value="未">未時 (13:00-15:00)</option>
              <option value="申">申時 (15:00-17:00)</option>
              <option value="酉">酉時 (17:00-19:00)</option>
              <option value="戌">戌時 (19:00-21:00)</option>
              <option value="亥">亥時 (21:00-23:00)</option>
            </select>
          </div>
        </div>

        <div class="xf-row">
          <div class="xf-form-group">
            <label class="xf-label" for="xf-place">出生地（選填）</label>
            <input type="text" id="xf-place" class="xf-input" placeholder="例如：台北">
          </div>
          <div class="xf-form-group">
            <label class="xf-label">性別</label>
            <div class="xf-radio-group">
              <label class="xf-radio-label">
                <input type="radio" name="gender" value="male" checked> 男
              </label>
              <label class="xf-radio-label">
                <input type="radio" name="gender" value="female"> 女
              </label>
            </div>
          </div>
        </div>

        <div class="xf-form-submit">
          <button type="submit" class="xf-btn xf-btn-gold">小彌幫你算</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== 畫面3：Loading ===== -->
  <div id="xf-page-loading" class="xf-page">
    <div class="xf-loading">
      <div class="xf-loading-wheel"></div>
      <p class="xf-loading-text">小彌正在為你推演天機⋯</p>
      <p class="xf-loading-sub">翻閱命盤，細察星辰⋯</p>
    </div>
  </div>

  <!-- ===== 畫面4：結果頁 ===== -->
  <div id="xf-page-result" class="xf-page">
    <div class="xf-frame-double xf-result-header">
      <h2 class="xf-result-title">命理揭曉</h2>
      <p id="xf-result-name" class="xf-result-name"></p>
    </div>

    <!-- Tabs -->
    <div id="xf-tabs" class="xf-tabs">
      <button class="xf-tab active" data-target="xf-tab-bazi">八字</button>
      <button class="xf-tab" data-target="xf-tab-ziwei">紫微</button>
      <button class="xf-tab" data-target="xf-tab-life">靈數</button>
      <button class="xf-tab" data-target="xf-tab-renleitu">人類圖</button>
      <button class="xf-tab" data-target="xf-tab-astro">占星</button>
      <button class="xf-tab" data-target="xf-tab-divine">塔羅·易經</button>
    </div>

    <!-- 八字 -->
    <div id="xf-tab-bazi" class="xf-tab-content active">
      <div class="xf-frame xf-card visible">
        <h3 class="xf-card-title">八字</h3>
        <p class="xf-card-subtitle">四柱八字 · 五行生剋</p>
        <div class="xf-card-divider"></div>
        <div id="xf-bazi-text" class="xf-card-body"></div>
      </div>
    </div>

    <!-- 紫微 -->
    <div id="xf-tab-ziwei" class="xf-tab-content">
      <div class="xf-frame xf-card">
        <h3 class="xf-card-title">紫微斗數</h3>
        <p class="xf-card-subtitle">紫微星曜 · 十二宮位</p>
        <div class="xf-card-divider"></div>
        <div id="xf-ziwei-text" class="xf-card-body"></div>
      </div>
    </div>

    <!-- 生命靈數 -->
    <div id="xf-tab-life" class="xf-tab-content">
      <div class="xf-frame xf-card">
        <h3 class="xf-card-title">生命靈數</h3>
        <p class="xf-card-subtitle">Life Path Number</p>
        <div class="xf-card-divider"></div>
        <div id="xf-life-number" class="xf-number-large"></div>
        <div class="xf-card-body">
          <p id="xf-life-meaning"></p>
        </div>
      </div>
    </div>

    <!-- 人類圖 -->
    <div id="xf-tab-renleitu" class="xf-tab-content">
      <div class="xf-frame xf-card">
        <h3 class="xf-card-title">人類圖</h3>
        <p class="xf-card-subtitle">Human Design</p>
        <div class="xf-card-divider"></div>
        <div id="xf-renleitu-text" class="xf-card-body"></div>
      </div>
    </div>

    <!-- 占星 -->
    <div id="xf-tab-astro" class="xf-tab-content">
      <div class="xf-frame xf-card">
        <h3 class="xf-card-title">西洋占星</h3>
        <p class="xf-card-subtitle">西方星盤 · 行星宮位</p>
        <div class="xf-card-divider"></div>
        <div id="xf-astrology-text" class="xf-card-body"></div>
      </div>
    </div>

    <!-- 塔羅 + 易經 -->
    <div id="xf-tab-divine" class="xf-tab-content">
      <div class="xf-frame xf-card" id="xf-tarot-section">
        <h3 class="xf-card-title">塔羅牌</h3>
        <p class="xf-card-subtitle">大阿爾克那</p>
        <div class="xf-card-divider"></div>
        <div class="xf-tarot-card">
          <div class="xf-tarot-card-name" id="xf-tarot-name"></div>
          <p class="xf-tarot-card-meaning" id="xf-tarot-meaning"></p>
          <button class="xf-btn xf-btn-outline" id="xf-draw-tarot" style="margin-top:1rem">重新抽牌</button>
        </div>
      </div>

      <div class="xf-frame xf-card" style="margin-top:1rem">
        <h3 class="xf-card-title">易經</h3>
        <p class="xf-card-subtitle">擲幣起卦</p>
        <div class="xf-card-divider"></div>
        <div id="xf-yijing-display"></div>
        <div style="text-align:center;margin-top:1rem">
          <button class="xf-btn xf-btn-outline" id="xf-draw-yijing">重新起卦</button>
        </div>
      </div>
    </div>

    <!-- 小彌總結 -->
    <div class="xf-frame xf-summary">
      <div class="xf-summary-seal">
        <div class="xf-summary-seal-text">小彌</div>
      </div>
      <h2 class="xf-summary-title">小彌的總結</h2>
      <div class="xf-card-divider"></div>
      <div id="xf-summary-body" class="xf-summary-body"></div>
    </div>

    <!-- 再算一次 -->
    <div style="text-align:center;margin:2rem 0">
      <button id="xf-restart" class="xf-btn xf-btn-outline">再算一次</button>
    </div>

    <div class="xf-footer">— 命理是地圖，不是目的地 —</div>
  </div>

</div>

<script>
/* ===== 小彌算命 · JavaScript ===== */

document.addEventListener('DOMContentLoaded', function () {

  /* ===== 塔羅牌資料 ===== */
  const TAROT_MAJOR = [
    { num: 0, name: '愚者', meaning: '新的開始、冒險、純真。你正站在未知的起點，放下顧慮向前走吧。' },
    { num: 1, name: '魔術師', meaning: '創造力、技能、自信。你擁有達成目標所需的一切工具。' },
    { num: 2, name: '女祭司', meaning: '直覺、內在智慧、神秘。答案在你心中，靜下來聆聽。' },
    { num: 3, name: '皇后', meaning: '豐收、滋養、大自然。享受生命的豐盛，允許自己被照顧。' },
    { num: 4, name: '皇帝', meaning: '權威、結構、穩定。建立秩序，負起領導的責任。' },
    { num: 5, name: '教皇', meaning: '傳統、指引、信仰。向智者學習，或成為他人的導師。' },
    { num: 6, name: '戀人', meaning: '選擇、連結、價值觀。跟隨你的心做出重要的選擇。' },
    { num: 7, name: '戰車', meaning: '意志力、決心、勝利。用紀律和專注克服障礙。' },
    { num: 8, name: '力量', meaning: '內在力量、勇氣、溫柔。真正的力量來自溫柔與耐心。' },
    { num: 9, name: '隱士', meaning: '內省、 solitude、尋求真理。獨處不是孤獨，是尋找光的必要路程。' },
    { num: 10, name: '命運之輪', meaning: '轉變、循環、契機。命運正在轉動，迎接變化。' },
    { num: 11, name: '正義', meaning: '公平、真理、因果。種什麼因得什麼果，真相終將顯現。' },
    { num: 12, name: '吊人', meaning: '暫停、犧牲、新視角。有時停滯是為了讓你看見不同的世界。' },
    { num: 13, name: '死神', meaning: '結束、轉變、放下。結束不是終點，是重生的前奏。' },
    { num: 14, name: '節制', meaning: '平衡、調和、中庸。找到你的節奏，不急不徐。' },
    { num: 15, name: '惡魔', meaning: '束縛、執著、物質主義。認清什麼在困住你，你就有力量掙脫。' },
    { num: 16, name: '高塔', meaning: '崩壞、覺醒、劇變。舊結構倒塌，為新的你騰出空間。' },
    { num: 17, name: '星星', meaning: '希望、靈感、平靜。在黑暗中看見星光，保持信心。' },
    { num: 18, name: '月亮', meaning: '幻象、恐懼、潛意識。面對陰影，才能看見真相。' },
    { num: 19, name: '太陽', meaning: '喜悅、成功、活力。陰霾散去，你值得快樂。' },
    { num: 20, name: '審判', meaning: '重生、召喚、覺醒。聽見內心的呼喚，回應它。' },
    { num: 21, name: '世界', meaning: '完成、整合、圓滿。一個循環的完成，慶祝你的旅程。' }
  ];

  /* ===== 易經擲幣法 ===== */
  function castYijing () {
    const lines = [];
    for (let i = 0; i < 6; i++) {
      const coin1 = Math.floor(Math.random() * 2) + 2;
      const coin2 = Math.floor(Math.random() * 2) + 2;
      const coin3 = Math.floor(Math.random() * 2) + 2;
      const total = coin1 + coin2 + coin3;
      const isYang = (total === 7 || total === 9);
      const isChanging = (total === 6 || total === 9);
      lines.push({ yang: isYang, changing: isChanging, value: total });
    }
    return lines;
  }

  function renderYijing (lines) {
    const yaoChars = lines.map(l => {
      let cls = l.yang ? 'xf-yao xf-yao-yang' : 'xf-yao xf-yao-yin';
      if (l.changing) cls += ' xf-yao-changing';
      return '<div class="' + cls + '"></div>';
    }).join('');
    return '<div class="xf-hexagram">' + yaoChars + '</div>';
  }

  /* ===== 生命靈數計算 ===== */
  function calcLifePath (year, month, day) {
    var sumDigits = function (n) { return String(n).split('').reduce(function (a, c) { return a + parseInt(c); }, 0); };
    var total = sumDigits(year) + sumDigits(month) + sumDigits(day);
    while (total >= 10) total = sumDigits(total);
    return total;
  }

  /* ===== 頁面切換 ===== */
  var pages = {
    home: document.getElementById('xf-page-home'),
    form: document.getElementById('xf-page-form'),
    loading: document.getElementById('xf-page-loading'),
    result: document.getElementById('xf-page-result')
  };

  function goTo (pageId) {
    for (var key in pages) {
      if (pages[key]) pages[key].classList.remove('active');
    }
    if (pages[pageId]) pages[pageId].classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /* ===== 表單處理 ===== */
  var form = document.getElementById('xf-form');
  var nameInput = document.getElementById('xf-name');
  var dateInput = document.getElementById('xf-birthday');
  var hourSelect = document.getElementById('xf-hour');
  var placeInput = document.getElementById('xf-place');
  var genderInputs = document.querySelectorAll('input[name="gender"]');

  form.addEventListener('submit', function (e) {
    e.preventDefault();

    var name = nameInput.value.trim();
    var dateVal = dateInput.value;
    var hour = hourSelect.value;
    var place = placeInput.value.trim();
    var gender = '';
    genderInputs.forEach(function (g) { if (g.checked) gender = g.value; });

    if (!name) { alert('請輸入你的姓名～'); return; }
    if (!dateVal) { alert('請選擇出生日期～'); return; }

    var dateParts = dateVal.split('-').map(Number);
    var year = dateParts[0], month = dateParts[1], day = dateParts[2];
    var lifePathNum = calcLifePath(year, month, day);
    var tarotCard = TAROT_MAJOR[Math.floor(Math.random() * TAROT_MAJOR.length)];
    var yijingLines = castYijing();

    var hourText = '不確定';
    if (hour) {
      var hourOpt = document.getElementById('xf-hour');
      hourText = hourOpt.options[hourOpt.selectedIndex].text;
    }

    window.xfResult = {
      name: name,
      birthDate: dateVal,
      hour: hourText,
      place: place || '未知',
      gender: gender === 'male' ? '男' : '女',
      year: year, month: month, day: day,
      lifePathNum: lifePathNum,
      tarotCard: tarotCard,
      yijingLines: yijingLines
    };

    goTo('loading');
    runLoadingSequence();
  });

  /* ===== Loading 動畫 ===== */
  function runLoadingSequence () {
    var loaderText = document.querySelector('.xf-loading-text');
    var loaderSub = document.querySelector('.xf-loading-sub');
    var steps = [
      '小彌正在為你推演天機⋯',
      '翻閱命盤，細察星辰⋯',
      '八字符號漸漸浮現⋯',
      '紫微星曜正在排列⋯',
      '靈數共振⋯人類圖展開⋯',
      '占星盤已經定位⋯'
    ];
    var i = 0;
    var interval = setInterval(function () {
      i++;
      if (i < steps.length) {
        loaderText.textContent = steps[i];
        loaderSub.textContent = '⋯⋯';
      } else {
        clearInterval(interval);
        loaderText.textContent = '✨ 命理推演完成 ✨';
        loaderSub.textContent = '讓小彌為你揭曉⋯';
        setTimeout(function () {
          renderResults();
          goTo('result');
        }, 800);
      }
    }, 900);
  }

  /* ===== 結果渲染 ===== */
  function renderResults () {
    var d = window.xfResult;
    if (!d) return;

    document.getElementById('xf-result-name').textContent = d.name + ' · ' + d.gender + ' · ' + d.birthDate;

    var lifePathEl = document.getElementById('xf-life-number');
    lifePathEl.textContent = d.lifePathNum;

    document.getElementById('xf-tarot-name').textContent = d.tarotCard.name;
    document.getElementById('xf-tarot-meaning').textContent = d.tarotCard.meaning;
    document.getElementById('xf-yijing-display').innerHTML = renderYijing(d.yijingLines);

    document.getElementById('xf-bazi-text').innerHTML = generateBaziReading(d);
    document.getElementById('xf-ziwei-text').innerHTML = generateZiweiReading(d);
    document.getElementById('xf-renleitu-text').innerHTML = generateRenleituReading(d);
    document.getElementById('xf-astrology-text').innerHTML = generateAstrologyReading(d);
    document.getElementById('xf-summary-body').innerHTML = generateSummary(d);

    setTimeout(function () {
      var cards = document.querySelectorAll('.xf-card');
      cards.forEach(function (el, i) {
        setTimeout(function () { el.classList.add('visible'); }, i * 250);
      });
    }, 300);

    initTabs();
  }

  /* ===== 命理解讀產生器 ===== */
  function generateBaziReading (d) {
    var heavenlyStems = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
    var earthlyBranches = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
    var stem = heavenlyStems[d.year % 10];
    var branch = earthlyBranches[d.year % 12];
    var dayStem = heavenlyStems[(d.year + d.month + d.day) % 10];
    var dayBranch = earthlyBranches[(d.month + d.day) % 12];
    var stemMonth = heavenlyStems[d.month % 10];
    var branchMonth = earthlyBranches[d.month % 12];
    var wuxing = ['木','木','火','火','土','土','金','金','水','水'];
    var seasons = ['春','夏','秋','冬'];
    var seasonPower = ['木旺','火旺','金旺','水旺'];
    var zodiac = ['鼠','牛','虎','兔','龍','蛇','馬','羊','猴','雞','狗','豬'];
    var nature = d.lifePathNum % 2 === 0 ? '偏柔，以柔克剛，善於調和' : '偏剛，意志堅定，適合開創';
    return '<p><strong>八字四柱</strong>：' + stem + branch + '年 · ' + stemMonth + branchMonth + '月 · ' + dayStem + dayBranch + '日 · ' + d.hour + '時</p><p>你的日主為<strong>' + dayStem + '</strong>，屬' + wuxing[heavenlyStems.indexOf(dayStem)] + '性。生於' + seasons[Math.floor(d.month / 3) % 4] + '月，' + seasonPower[Math.floor(d.month / 3) % 4] + '當令。</p><p>年柱' + stem + branch + '，' + zodiac[earthlyBranches.indexOf(branch)] + '年生人。整體命格' + nature + '，五行流通尚可，晚年運勢漸入佳境。</p>';
  }

  function generateZiweiReading (d) {
    var stars = ['紫微', '天機', '太陽', '武曲', '天同', '廉貞', '天府', '太陰', '貪狼', '巨門', '天相', '天梁', '七殺', '破軍'];
    var shuffled = stars.slice().sort(function () { return Math.random() - 0.5; });
    var mainStar = shuffled[0];
    var supportStar = shuffled[1];
    var starPositions = ['命宮', '兄弟宮', '夫妻宮', '子女宮', '財帛宮', '疾厄宮', '遷移宮', '交友宮', '官祿宮', '田宅宮', '福德宮', '父母宮'];
    var mainPos = starPositions[d.lifePathNum % 12];
    var desc;
    if (stars.indexOf(mainStar) < 4) {
      desc = '格局高貴，具有領袖氣質';
    } else if (mainStar === '貪狼' || mainStar === '破軍' || mainStar === '七殺') {
      desc = '殺破狼格局，一生多變動，但每次變動都是向上躍升';
    } else {
      desc = '穩重踏實，福澤深厚';
    }
    var travel = ['有利','平順','需防小人','貴人相助','先苦後甘','遠行機遇多'][d.lifePathNum % 6];
    return '<p>命宮在<strong>' + mainPos + '</strong>，主星<strong>' + mainStar + '</strong>，輔星<strong>' + supportStar + '</strong>同宮。</p><p>' + mainStar + '坐命之人，' + desc + '。</p><p>' + supportStar + '在遷移宮，外出發展' + travel + '。財帛宮無煞沖破，財運平穩，中年後有積蓄。</p>';
  }

  function generateRenleituReading (d) {
    var types = ['顯示者', '生產者', '顯示生產者', '投射者', '反映者'];
    var type = types[d.lifePathNum % 5];
    var channels = ['1-8 啟發的通道', '2-14 煉金術的通道', '3-60 突變的通道', '5-15 韻律的通道',
      '7-31 領導的通道', '10-20 覺醒的通道', '13-33 足跡的通道', '34-57 力量的通道',
      '37-40 社群的通道', '39-55 情緒的通道', '41-30 體驗的通道', '42-53 成熟的通道'];
    var channel = channels[d.lifePathNum % channels.length];
    var typeDesc;
    if (type === '顯示者') typeDesc = '你天生就是來發起行動的，不需要等待他人的允許。';
    else if (type === '生產者') typeDesc = '你的能量來自回應——對生命中的事物做出反應，而不是主動發起。';
    else if (type === '顯示生產者') typeDesc = '你結合了發起與回應兩種能量，快速而強大。';
    else if (type === '投射者') typeDesc = '你的天賦是看穿他人，等待被邀請才發揮最大影響力。';
    else typeDesc = '你是罕見的反映者，像一面鏡子反映周圍的能量，你的智慧來自適應力。';
    var strategy = ['等待回應','等待邀請','發起行動','先感受再決定'][d.lifePathNum % 4];
    var authority = d.lifePathNum % 2 === 0 ? '你的內在權威是情緒中心，需要時間讓情緒清明再做決定。' : '你的內在權威是薦骨中心，用身體的「嗯」或「嗯？」來判斷。';
    return '<p>你的類型：<strong>' + type + '</strong></p><p>' + typeDesc + '</p><p>定義通道：<strong>' + channel + '</strong>。這條通道賦予你與眾不同的天賦，是你與生俱來的能量流動方式。</p><p>人生策略：' + strategy + '。' + authority + '</p>';
  }

  function generateAstrologyReading (d) {
    var signs = ['牡羊座', '金牛座', '雙子座', '巨蟹座', '獅子座', '處女座', '天秤座', '天蠍座', '射手座', '摩羯座', '水瓶座', '雙魚座'];
    var sunAdj = ['熱情奔放','踏實穩固','靈活多變','溫柔敏感','自信耀眼','細膩完美','平衡和諧','深沉強烈','樂觀自由','務實堅毅','前衛獨立','浪漫包容'];
    var moonAdj = ['直率','穩定','好奇','細膩','驕傲','自律','理性','深刻','奔放','沉穩','疏離','同理'];
    var risingAdj = ['直接','可靠','聰明','溫暖','耀眼','精準','優雅','神秘','隨性','嚴肅','獨特','柔和'];
    var houses = ['一宮（自我）', '二宮（財帛）', '三宮（溝通）', '四宮（家庭）',
      '五宮（愛情）', '六宮（健康）', '七宮（伴侶）', '八宮（轉化）',
      '九宮（遠行）', '十宮（事業）', '十一宮（人際）', '十二宮（潛意識）'];
    var sunIdx = (d.month - 1 + Math.floor(d.day / 20)) % 12;
    var moonIdx = (d.year + d.month) % 12;
    var risingIdx = (d.day + d.lifePathNum) % 12;
    var planetDesc;
    if (d.lifePathNum % 3 === 0) {
      planetDesc = '多星聚集在' + houses[sunIdx % 12] + '，該領域是你此生的重點。';
    } else {
      planetDesc = '行星分布均勻，各方面發展平衡。';
    }
    var jupiterDesc = d.lifePathNum % 2 === 0 ? '帶來好運與擴張' : '需要努力才能獲得回報';
    return '<p><strong>太陽</strong>：' + signs[sunIdx] + ' — 你的核心自我。' + sunAdj[sunIdx] + '</p><p><strong>月亮</strong>：' + signs[moonIdx] + ' — 你的內在情緒。' + moonAdj[moonIdx] + '而需要安全感。</p><p><strong>上升</strong>：' + signs[risingIdx] + ' — 你給人的第一印象。' + risingAdj[risingIdx] + '</p><p>重要行星分布：' + planetDesc + '木星在' + houses[(d.year + d.lifePathNum) % 12] + '，' + jupiterDesc + '。</p>';
  }

  function generateSummary (d) {
    var signsShort = ['牡羊','金牛','雙子','巨蟹','獅子','處女','天秤','天蠍','射手','摩羯','水瓶','雙魚'];
    var talent = ['行動力','穩定性','適應力','情感深度','創造力','分析力','公正感','洞察力','探索欲','耐力','獨立性','直覺力'];
    var types = ['顯示者','生產者','顯示生產者','投射者','反映者'];
    var stars = ['紫微','天機','太陽','武曲','天同','廉貞','天府','太陰','貪狼','巨門','天相','天梁','七殺','破軍'];
    var sunIdx = (d.month - 1 + Math.floor(d.day / 20)) % 12;
    var nature = d.lifePathNum % 2 === 0 ? '善於整合、富有同理心' : '具有開創精神、行動力強';
    return '<p>親愛的 <strong>' + d.name + '</strong>，綜合你提供的生辰資訊，小彌為你梳理了以下幾點：</p><p>你的<strong>生命靈數 ' + d.lifePathNum + '</strong> 與八字日主呼應，顯示你是一個' + nature + '的人。占星盤中太陽' + signsShort[sunIdx] + '座賦予你' + talent[d.lifePathNum % 12] + '的天賦。</p><p>人類圖中你屬於' + types[d.lifePathNum % 5] + '類型，這與紫微' + stars[d.lifePathNum % 14] + '坐命的格局互相印證——你不是偶然來到這個世界的。</p><p>這次為你抽到的塔羅牌是<strong>「' + d.tarotCard.name + '」</strong>：' + d.tarotCard.meaning + '</p><p>\u{1F52E} <strong>小彌的話</strong>：命理是地圖，不是目的地。這些符號只是幫你看見自己本來就有的樣子。你比你以為的更完整。</p>';
  }

  /* ===== Tabs ===== */
  function initTabs () {
    var tabContainer = document.getElementById('xf-tabs');
    if (!tabContainer) return;
    var tabs = tabContainer.querySelectorAll('.xf-tab');
    var contents = document.querySelectorAll('.xf-tab-content');
    tabs.forEach(function (tab) {
      tab.addEventListener('click', function () {
        tabs.forEach(function (t) { t.classList.remove('active'); });
        contents.forEach(function (c) { c.classList.remove('active'); });
        this.classList.add('active');
        var target = document.getElementById(this.dataset.target);
        if (target) target.classList.add('active');
      });
    });
  }

  /* ===== 開始算命按鈕 ===== */
  document.addEventListener('click', function (e) {
    if (e.target.id === 'xf-start-btn') {
      goTo('form');
    }
  });

  /* ===== 再算一次 ===== */
  document.addEventListener('click', function (e) {
    if (e.target.id === 'xf-restart') {
      document.querySelectorAll('.xf-card').forEach(function (el) { el.classList.remove('visible'); });
      goTo('form');
    }
  });

  /* ===== 抽牌按鈕 ===== */
  var drawTarotBtn = document.getElementById('xf-draw-tarot');
  if (drawTarotBtn) {
    drawTarotBtn.addEventListener('click', function () {
      var card = TAROT_MAJOR[Math.floor(Math.random() * TAROT_MAJOR.length)];
      document.getElementById('xf-tarot-name').textContent = card.name;
      document.getElementById('xf-tarot-meaning').textContent = card.meaning;
      var tarotSection = document.getElementById('xf-tarot-section');
      if (tarotSection) {
        tarotSection.style.transition = 'background 0.3s';
        tarotSection.style.background = 'rgba(194, 59, 34, 0.08)';
        setTimeout(function () { tarotSection.style.background = ''; }, 600);
      }
    });
  }

  /* ===== 重抽易經 ===== */
  var drawYijingBtn = document.getElementById('xf-draw-yijing');
  if (drawYijingBtn) {
    drawYijingBtn.addEventListener('click', function () {
      var lines = castYijing();
      document.getElementById('xf-yijing-display').innerHTML = renderYijing(lines);
    });
  }

});
</script>
</body>
</html>
